<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plotty - Libri</title>
  <script src="auth-check.js"></script>
  <script>checkAuth();</script>
  <link rel="stylesheet" href="home.css" />
  <link rel="stylesheet" href="books.css" />
  <script src="books.js" defer></script>
</head>
<body>
  <div class="bg-layer" aria-hidden="true"></div>
  <div class="bg-overlay" aria-hidden="true"></div>

  <nav class="topnav">
    <div class="topnav-brand">Plotty</div>
    <div class="topnav-right">
      <form class="search-form-right" id="booksSearchForm">
        <input type="text" placeholder="Cerca titolo, autore, descrizione..." class="search-input" id="booksSearchInput">
        <button type="submit" class="search-submit" aria-label="Cerca">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button>
      </form>
      <a href="home.html" class="btn-avatar" aria-label="Torna home">Home</a>
      <a href="personal.html" class="btn-avatar" aria-label="Profilo utente">
        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
      </a>
    </div>
  </nav>

  <main class="main-content books-main">
    <div class="section-header books-header">
      <h1 class="section-title">Catalogo Libri</h1>
      <div class="section-tags" id="booksTags">
        <button class="tag active" data-genre="All">All</button>
        <button class="tag" data-genre="Adventure">Adventure</button>
        <button class="tag" data-genre="Fantasy">Fantasy</button>
        <button class="tag" data-genre="Romance">Romance</button>
        <button class="tag" data-genre="Mystery">Mystery</button>
      </div>
    </div>

    <p class="books-count" id="booksCount">0 risultati</p>

    <div class="story-grid" id="booksGrid"></div>
  </main>
</body>
</html>
