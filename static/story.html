<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plotty – The Whispering Forest</title>
    
<script src="auth-check.js"></script>
<script>checkAuth();</script>
<script src="story.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Lora:ital,wght@0,400;0,500;1,400;1,500&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="story.css" />
</head>

<body>

<!-- ====== BARRA PROGRESSO LETTURA ====== -->
<div class="reading-progress" id="readingProgress"></div>

<!-- ====== NAV ====== -->
<nav class="topnav">
    <div class="topnav-left">
        <a href="home.html" class="btn-back">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
            Indietro
        </a>
        <span class="nav-brand">Plotty</span>
    </div>

    <div class="topnav-right">
        <!-- Font size toggle -->
        <button class="nav-btn" id="btnFont" data-tip="Testo" aria-label="Impostazioni testo">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <polyline points="4 7 4 4 20 4 20 7"/>
                <line x1="9" y1="20" x2="15" y2="20"/>
                <line x1="12" y1="4" x2="12" y2="20"/>
            </svg>
        </button>

        <!-- Bookmark -->
        <button class="nav-btn" id="btnBookmark" data-tip="Salva" aria-label="Salva storia">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
            </svg>
        </button>
    </div>
</nav>

<!-- ====== PANNELLO FONT ====== -->
<div class="font-panel" id="fontPanel">
    <span class="font-panel-label">Dimensione testo</span>
    <div class="font-size-row">
        <button class="font-size-btn" id="fontDecrease">A−</button>
        <span class="font-size-display" id="fontSizeDisplay">Media</span>
        <button class="font-size-btn" id="fontIncrease">A+</button>
    </div>
    <span class="font-panel-label">Tema</span>
    <div class="theme-row">
        <button class="theme-option active" data-theme="default">Chiaro</button>
        <button class="theme-option" data-theme="sepia">Seppia</button>
        <button class="theme-option" data-theme="dark">Scuro</button>
    </div>
</div>

<!-- ====== HERO ====== -->
<header class="story-hero">
    <img class="story-hero-img" id="heroCover" src="https://res.cloudinary.com/drwzjt2oi/image/upload/v1776681940/plotty/layout/story-1.jpg" alt="Cover storia" />
    <div class="story-hero-overlay"></div>
    <div class="story-hero-meta">
        <div class="story-genre-badge" id="heroGenre">Adventure</div>
        <h1 class="story-main-title" id="heroTitle">The Whispering Forest</h1>
        <p class="story-author-line">di <a href="user.html" id="heroAuthor">Sakura Tanaka</a></p>
    </div>
</header>

<!-- ====== META BAR ====== -->
<div class="story-meta-bar">
    <div class="meta-chip">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
        </svg>
        <span id="metaWords">–</span>
    </div>

    <div class="meta-divider"></div>

    <div class="meta-chip">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
        <span id="metaReadTime">–</span>
    </div>

    <div class="meta-divider"></div>

    <div class="meta-chip">
        <div class="rating-stars" id="metaStars">
            <!-- iniettato da JS -->
        </div>
        <span class="rating-value" id="metaRating">–</span>
    </div>

    <div class="meta-divider"></div>

    <div class="meta-chip">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
        </svg>
        <span id="metaViews">–</span> letture
    </div>
</div>

<!-- ====== CORPO LETTURA ====== -->
<div class="reading-wrap">

    <!-- Abstract / Sinossi -->
    <div class="story-summary">
        <p id="storySummary">
            Caricamento sinossi…
        </p>
    </div>

    <!-- Divisore decorativo -->
    <div class="story-divider">
        <span class="story-divider-icon">❧</span>
    </div>

    <!-- Testo della storia — i <p> vengono scritti da JS -->
    <div class="story-body" id="storyBody">
        <!-- Skeleton while loading -->
        <div class="skeleton skeleton-line full"></div>
        <div class="skeleton skeleton-line full"></div>
        <div class="skeleton skeleton-line medium"></div>
        <div class="skeleton skeleton-line full"></div>
        <div class="skeleton skeleton-line full"></div>
        <div class="skeleton skeleton-line short"></div>
        <div class="skeleton skeleton-line full"></div>
        <div class="skeleton skeleton-line full"></div>
        <div class="skeleton skeleton-line medium"></div>
    </div>

    <!-- Fine storia -->
    <div class="story-end" id="storyEnd">
        <span class="story-end-label">Fine</span>
        <span class="story-end-title" id="storyEndTitle">The Whispering Forest</span>
    </div>
</div>

<!-- ====== REACTIONS ====== -->
<div class="reactions-bar">
    <div class="reactions-left">
        <button class="reaction-btn" id="btnLike">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
            <span class="reaction-count" id="likeCount">–</span>
        </button>
        <button class="reaction-btn" id="btnComment">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            <span class="reaction-count" id="commentCount">–</span>
        </button>
    </div>
    <div class="reactions-right">
        <button class="share-btn" id="btnShare">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
                <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
            </svg>
            Condividi
        </button>
    </div>
</div>

<!-- ====== FOOTER ====== -->
<footer class="site-footer">
    <p class="footer-brand">Plotty</p>
    <p class="footer-copy">A place where stories come alive.</p>
</footer>

</body>
</html>
