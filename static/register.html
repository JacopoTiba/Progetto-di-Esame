<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | Plotty</title>
  <link rel="stylesheet" href="register.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="bg-layer" aria-hidden="true"></div>
  <div class="bg-overlay" aria-hidden="true"></div>

  <main class="page page-register">

    <nav class="topnav" aria-label="Main navigation">
      <span class="topnav-brand">Plotty</span>
      <div class="topnav-links">
        <a href="index.html" class="nav-link">Sign In</a>
        <a href="register.html" class="nav-link active">Register</a>
      </div>
      <button class="hamburger" aria-label="Open menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6" />
          <line x1="3" y1="12" x2="21" y2="12" />
          <line x1="3" y1="18" x2="21" y2="18" />
        </svg>
      </button>
    </nav>

    <div class="content">
      
      <div class="left-col">
        <p class="eyebrow">Welcome here</p>
        <h1 class="hero-title">Create your<br/>account.</h1>
        <p class="hero-sub">Fill in the details below to join our community</p>

        <form id="register-form" class="login-form" action="#" method="post">
            
            <div class="input-group">
                <input type="text" id="reg-nome" name="nome" placeholder="Nome" required />
            </div>

            <div class="input-group">
                <input type="text" id="reg-cognome" name="cognome" placeholder="Cognome" required />
            </div>

            <div class="input-group full">
                <input type="text" id="reg-username" name="username" placeholder="Username" required />
            </div>

            <div class="input-group full">
                <input type="email" id="reg-email" name="email" placeholder="Email" required />
            </div>

            <div class="input-group">
                <div class="password-wrapper">
                    <input type="password" id="pass" name="password" placeholder="Password" required />
                    <button type="button" class="toggle-pass" onclick="togglePassword('pass', 'eyeOn1', 'eyeOff1')" aria-label="Toggle password visibility">
                        <svg id="eyeOn1" class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        <svg id="eyeOff1" class="eye-icon eye-off" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                            <line x1="1" y1="1" x2="23" y2="23"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="input-group">
                <div class="password-wrapper">
                    <input type="password" id="conf-pass" name="conferma_password" placeholder="Conferma password" required />
                    <button type="button" class="toggle-pass" onclick="togglePassword('conf-pass', 'eyeOn2', 'eyeOff2')" aria-label="Toggle password visibility">
                        <svg id="eyeOn2" class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        <svg id="eyeOff2" class="eye-icon eye-off" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                            <line x1="1" y1="1" x2="23" y2="23"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="input-group full">
                <input type="text" id="reg-indirizzo" name="indirizzo" placeholder="Indirizzo" required />
            </div>

            <button type="submit" class="btn-signin full">
                Register now
            </button>
        </form>

        <div id="messaggio-box"></div>

        <p class="bottom-link">
          Already have an account? <a href="index.html">Sign In</a>
        </p>
      </div>

      <div class="right-col">
        <div class="image-frame">
          <img src="img/img2.jpg" alt="Ghibli illustration" />
        </div>
      </div>

    </div>
  </main>

  <script>
    function togglePassword(inputId, eyeOnId, eyeOffId) {
      var input = document.getElementById(inputId);
      var eyeOn = document.getElementById(eyeOnId);
      var eyeOff = document.getElementById(eyeOffId);
      if (input.type === 'password') {
        input.type = 'text';
        eyeOn.style.display = 'none';
        eyeOff.style.display = 'block';
      } else {
        input.type = 'password';
        eyeOn.style.display = 'block';
        eyeOff.style.display = 'none';
      }
    }
  </script>

  <script type="module" src="script.js"></script>
<div id="otp-modal">
    <div class="otp-modal-box">
        <h2 class="otp-modal-title">Verifica Email</h2>
        <p class="otp-modal-text">Inserisci il codice di 6 cifre inviato alla tua mail</p>
        
        <input type="text" id="otp-input" maxlength="6" placeholder="123456">
        
        <button id="btn-conferma-otp" class="btn-signin otp-btn-full">Verifica e Attiva</button>
        <p id="otp-error"></p>
    </div>
</div>
</body>
</html>
